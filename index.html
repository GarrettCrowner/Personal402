<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Rammy</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styling.css">
</head>
<body>
   <!-- Main Chat Container -->
    <div id="chat-container">
        <!-- Header Section -->
        <header id="chat-header">
            <button id="chat-close-btn">
                 <ion-icon name="close-outline"></ion-icon>
            </button>
            <h2>Ask Rammy</h2>
            <button id="chat-options-btn">
                <ion-icon name="ellipsis-vertical-circle-outline"></ion-icon>
            </button>
        </header>
        <!-- Message Display Area -->
        <main id="message-container">
            <!-- Messages will be appended here by chat.js -->
        </main>
        
        <!-- Input Area -->
        <footer id="chat-footer">
            <form id="chat-user-form">
                <input type="text" id="chat-user-input" placeholder="Ask a question..." required>
                <button type="submit" id="send-btn">
                    <ion-icon name="send"></ion-icon>
                </button>
            </form>
        </footer>
    </div>
    <script src="chat.js"></script>
</body>
</html>
